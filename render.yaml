services:
  - type: web
    name: remedial-food-drink-collection
    env: php
    buildCommand: composer install --no-dev --optimize-autoloader && php -r "file_exists('database/database.sqlite') || touch('database/database.sqlite')"
    startCommand: php artisan migrate --force --seed && php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: database/database.sqlite
